<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家后台 - Shopify AI Pro</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background: #1a1f36;
            color: white;
            padding: 30px 20px;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            margin-bottom: 15px;
        }
        .sidebar a {
            color: #8a94a6;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .main-content {
            padding: 30px;
            background: #f8fafc;
        }
        .section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .btn {
            background: linear-gradient(135deg, #0066ff 0%, #00c9a7 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,102,255,0.2);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <h2 style="margin-bottom: 30px;">商家后台</h2>
            <ul>
                <li><a href="#overview" class="active">📊 总览</a></li>
                <li><a href="#knowledge">🧠 知识库管理</a></li>
                <li><a href="#products">📦 产品信息</a></li>
                <li><a href="#shipping">🚚 配送设置</a></li>
                <li><a href="#returns">🔄 退货政策</a></li>
                <li><a href="#faq">❓ 常见问题</a></li>
                <li><a href="#ai-settings">⚙️ AI设置</a></li>
                <li><a href="#analytics">📈 数据分析</a></li>
                <li><a href="#billing">💰 账单管理</a></li>
            </ul>
        </div>
        
        <!-- 主内容 -->
        <div class="main-content">
            <!-- 知识库管理 -->
            <div class="section" id="knowledge">
                <h2 style="margin-bottom: 25px;">知识库管理</h2>
                
                <div class="form-group">
                    <label>店铺品类</label>
                    <select class="form-control" id="productCategory">
                        <option value="fashion">服装时尚</option>
                        <option value="electronics">电子产品</option>
                        <option value="beauty">美妆护肤</option>
                        <option value="home">家居用品</option>
                        <option value="food">食品饮料</option>
                        <option value="sports">运动户外</option>
                        <option value="books">图书音像</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>店铺描述</label>
                    <textarea class="form-control" rows="3" placeholder="请描述您的店铺主要经营什么..."></textarea>
                </div>
                
                <h3 style="margin: 30px 0 15px;">自定义问答对</h3>
                <div id="faqItems">
                    <div class="faq-item" style="margin-bottom: 15px; padding: 15px; border: 1px solid #eee; border-radius: 8px;">
                        <input type="text" class="form-control" placeholder="问题：例如'你们的材质是什么？'" style="margin-bottom: 10px;">
                        <textarea class="form-control" rows="2" placeholder="回答：例如'我们的T恤使用100%纯棉材质...'"></textarea>
                    </div>
                </div>
                
                <button class="btn" onclick="addFaqItem()">+ 添加新问答</button>
                <button class="btn" style="background: #10b981; margin-left: 10px;" onclick="saveKnowledge()">💾 保存设置</button>
            </div>
            
            <!-- 产品信息 -->
            <div class="section" id="products">
                <h2 style="margin-bottom: 25px;">产品信息</h2>
                
                <div class="form-group">
                    <label>主要产品列表</label>
                    <div id="productList">
                        <div class="product-item" style="margin-bottom: 15px; padding: 15px; border: 1px solid #eee; border-radius: 8px;">
                            <input type="text" class="form-control" placeholder="产品名称" style="margin-bottom: 10px;">
                            <textarea class="form-control" rows="2" placeholder="产品描述"></textarea>
                            <input type="text" class="form-control" placeholder="价格" style="margin-top: 10px;">
                        </div>
                    </div>
                    <button class="btn" onclick="addProductItem()">+ 添加产品</button>
                </div>
            </div>
            
            <!-- 配送设置 -->
            <div class="section" id="shipping">
                <h2 style="margin-bottom: 25px;">配送设置</h2>
                
                <div class="form-group">
                    <label>国内配送时间</label>
                    <input type="text" class="form-control" value="3-5个工作日">
                </div>
                
                <div class="form-group">
                    <label>国际配送时间</label>
                    <input type="text" class="form-control" value="7-14个工作日">
                </div>
                
                <div class="form-group">
                    <label>包邮门槛</label>
                    <input type="text" class="form-control" value="订单满¥299包邮">
                </div>
                
                <div class="form-group">
                    <label>配送合作商</label>
                    <input type="text" class="form-control" value="顺丰、中通、EMS">
                </div>
            </div>
            
            <!-- AI设置 -->
            <div class="section" id="ai-settings">
                <h2 style="margin-bottom: 25px;">AI客服设置</h2>
                
                <div class="form-group">
                    <label>回答语言</label>
                    <select class="form-control">
                        <option value="zh">中文</option>
                        <option value="en">英文</option>
                        <option value="both">中英文混合</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>回答语气</label>
                    <select class="form-control">
                        <option value="friendly">友好亲切</option>
                        <option value="professional">专业正式</option>
                        <option value="casual">轻松随意</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>回答长度</label>
                    <select class="form-control">
                        <option value="short">简洁</option>
                        <option value="medium">中等</option>
                        <option value="detailed">详细</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" checked> 自动推荐相关产品
                    </label>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function addFaqItem() {
            const container = document.getElementById('faqItems');
            const newItem = document.createElement('div');
            newItem.className = 'faq-item';
            newItem.innerHTML = `
                <input type="text" class="form-control" placeholder="问题" style="margin-bottom: 10px;">
                <textarea class="form-control" rows="2" placeholder="回答"></textarea>
                <button onclick="this.parentElement.remove()" style="margin-top: 10px; background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">删除</button>
            `;
            container.appendChild(newItem);
        }
        
        function addProductItem() {
            const container = document.getElementById('productList');
            const newItem = document.createElement('div');
            newItem.className = 'product-item';
            newItem.innerHTML = `
                <input type="text" class="form-control" placeholder="产品名称" style="margin-bottom: 10px;">
                <textarea class="form-control" rows="2" placeholder="产品描述"></textarea>
                <input type="text" class="form-control" placeholder="价格" style="margin-top: 10px;">
                <button onclick="this.parentElement.remove()" style="margin-top: 10px; background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">删除</button>
            `;
            container.appendChild(newItem);
        }
        
        function saveKnowledge() {
            // 这里添加保存到后端的逻辑
            alert('设置已保存！');
        }
    </script>
</body>
</html>
